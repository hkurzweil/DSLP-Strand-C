<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strand C Concept Sorter — DSLP Revision</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#F4F6F8}
    #app{display:flex;flex-direction:column;height:100vh}
    #header{background:#1B2A4A;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex-shrink:0}
    #header h1{font-size:16px;font-weight:700}
    #header p{font-size:11px;color:#8EADD4;margin-top:2px}
    #topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    #progress{background:#253659;border-radius:7px;padding:5px 12px;font-size:12px;white-space:nowrap}
    #progress span{color:#8EADD4}
    #export-btn{background:#028090;border:none;color:#fff;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}
    #body{display:flex;flex:1;min-height:0;overflow:hidden}
    /* QUEUE */
    #queue-panel{width:360px;min-width:280px;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    #queue-header{padding:12px 14px;border-bottom:1px solid #E2E8F0}
    #queue-header h2{font-size:12px;font-weight:700;color:#1B2A4A;margin-bottom:8px}
    #search{width:100%;border:1px solid #D1D5DB;border-radius:6px;padding:6px 9px;font-size:12px;margin-bottom:7px}
    .filters{display:flex;gap:5px}
    .filters select{flex:1;border:1px solid #D1D5DB;border-radius:6px;padding:4px 5px;font-size:11px}
    #queue-list{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
    /* CARDS */
    .card{background:#FAFAFA;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;cursor:grab;user-select:none}
    .card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);border-color:#C8D5E8}
    .card.dragging{opacity:.4;cursor:grabbing}
    .card-top{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;align-items:center}
    .badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
    .card-substrand{font-size:9px;color:#999;font-style:italic;margin-bottom:3px}
    .card-name{font-size:12px;font-weight:700;color:#1B2A4A;margin-bottom:4px}
    .card-desc{font-size:11px;color:#555;line-height:1.5}
    .card-return{margin-top:7px;font-size:10px;background:none;border:1px solid #ccc;border-radius:4px;padding:2px 8px;cursor:pointer;color:#666}
    /* DROP PANEL */
    #drop-panel{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .substrand-block{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .substrand-header{padding:9px 14px;color:#fff;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
    .zones-row{display:grid;gap:0}
    .zone{padding:12px 14px;min-height:110px;transition:background .12s}
    .zone.over{outline:2px dashed #028090;outline-offset:-3px;background:#EEF8FA}
    .zone-label{font-size:11px;font-weight:700;margin-bottom:2px}
    .zone-desc{font-size:10px;color:#888;font-style:italic;margin-bottom:8px}
    .zone-empty{color:#C8D5E0;font-size:11px;text-align:center;padding:10px 0}
    .zone-items{display:flex;flex-direction:column;gap:6px}
    /* OTHER BUCKETS */
    .other-block{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .other-header{background:#64748B;padding:9px 14px;color:#fff;font-weight:700;font-size:13px}
    .other-zones{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
    /* NOTE */
    .note{background:#FEF9EC;border:1px solid #F0D060;border-radius:8px;padding:10px 14px;font-size:11px;color:#7A5800;line-height:1.5}

    .card-custom{background:#FFFBF0;border:1.5px dashed #F0C040}
    .card-custom:hover{border-color:#E8A020}
    .card-input{width:100%;border:none;background:transparent;font-size:12px;font-weight:700;color:#1B2A4A;outline:none;margin-bottom:3px}
    .card-input::placeholder{color:#BBAA80;font-weight:400}
    .card-textarea{width:100%;border:none;background:transparent;font-size:11px;color:#555;outline:none;resize:none;line-height:1.5;min-height:40px}
    .card-textarea::placeholder{color:#BBAA80}
    .badge-custom{background:#E8A020}
    /* scrollbar */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>Strand C Concept Sorter — DSLP Revision</h1>
      <p>Drag concepts into the new Strand C structure, or route them elsewhere. Sources: V2 (Strand C &amp; D), V1 concepts that fell out of V2, A+H and K+T proposals.</p>
    </div>
    <div id="topbar">
      <div id="progress"><span>Placed: </span><b id="placed-count">0</b><span>/</span><b id="total-count">0</b><span> · </span><b id="pct">0%</b></div>
      <button id="export-btn">↓ Export CSV</button>
    </div>
  </div>
  <div id="body">
    <div id="queue-panel">
      <div id="queue-header">
        <h2>Concept Queue <span id="remaining" style="font-weight:400;color:#888;font-size:11px"></span></h2>
        <input id="search" placeholder="Search concepts..."/>
        <div class="filters">
          <select id="filter-source">
            <option value="">All Sources</option>
            <option value="V2-C">V2 (Strand C)</option>
            <option value="V2-D">V2 (Strand D)</option>
            <option value="V1">V1 — fell out of V2</option>
            <option value="A+H">Andee+Hollylynne</option>
            <option value="K+T">Kate+Thema</option>
          </select>
        </div>
      </div>
      <div id="queue-list"></div>
    </div>
    <div id="drop-panel">
      <div id="strand-c-zones"></div>
      <div class="other-block">
        <div class="other-header">Doesn't belong in Strand C → Route elsewhere</div>
        <div class="other-zones" id="other-zones"></div>
      </div>
</div>
  </div>
</div>
<script>
const CONCEPTS = [
  {id:"v2c_c11", source:"V2-C", substrand:"V2 Substrand C1 · Single Variable Distributions", name:"C.1.1 Describing and Visualizing Single Variable Distributions", desc:"Describe and visualize distributions of numerical and categorical data by characterizing shape, center, and spread (for numerical data) and frequencies and proportions (for categorical data), understanding how distribution characteristics impact interpretation."},
  {id:"v2c_c21", source:"V2-C", substrand:"V2 Substrand C2 · Multivariate Distributions", name:"C.2.1 Describing and Visualizing Multivariate Relationships", desc:"Describe and visualize relationships among multiple variables, both numerical and categorical, focusing on visualization as a tool for exploration and understanding and letting the data reveal its own patterns, trends, associations, and differences between groups."},
  {id:"v2c_c31", source:"V2-C", substrand:"V2 Substrand C3 · Investigating with Distributions", name:"C.3.1 Using Technology for Data Exploration", desc:"Use appropriate digital tools to support data exploration and analysis throughout the investigation process."},
  {id:"v2c_c32", source:"V2-C", substrand:"V2 Substrand C3 · Investigating with Distributions", name:"C.3.2 Investigating Questions about Single Variables", desc:"Use appropriate numerical and graphical summaries to reason about questions about single variables in context."},
  {id:"v2c_c33", source:"V2-C", substrand:"V2 Substrand C3 · Investigating with Distributions", name:"C.3.3 Investigating Questions about Multiple Variables", desc:"Use appropriate numerical and graphical summaries to investigate questions involving relationships among multiple variables in context."},
  {id:"v2d_d11", source:"V2-D", substrand:"V2 Substrand D1 · Understanding Models of Data", name:"D.1.1 Models as Approximations", desc:"Recognize and evaluate that all models are simplifications that are inherently incomplete (in George Box's words, \"all models are wrong\"), but can be useful approximations when they help us understand patterns and make predictions. Students learn to choose appropriate models for the situation and data available, assess the limitations of models and representations, and recognize the uncertainty inherent in any modeling activity."},
  {id:"v2d_d12", source:"V2-D", substrand:"V2 Substrand D1 · Understanding Models of Data", name:"D.1.2 Models as Mathematical Relationships", desc:"Examine how mathematical models express relationships between input variables and outputs, a structure that applies across simple functions to complex AI systems. In data science, a model is a mathematical or computational representation of relationships in data, used to describe, predict, or explain."},
  {id:"v2d_d13", source:"V2-D", substrand:"V2 Substrand D1 · Understanding Models of Data", name:"D.1.3 Probability Distributions as Models", desc:"Use probability distributions to model variation and uncertainty, updating conclusions as new evidence emerges."},
  {id:"v2d_d21", source:"V2-D", substrand:"V2 Substrand D2 · Building Models of Data", name:"D.2.1 Building Models for Quantitative Outcomes", desc:"Build and interpret models that predict or explain quantitative outcomes using appropriate representations and tools."},
  {id:"v2d_d22", source:"V2-D", substrand:"V2 Substrand D2 · Building Models of Data", name:"D.2.2 Building Models for Categorical Outcomes", desc:"Build and interpret models that predict or explain categorical outcomes, understanding how model outputs vary based on training data and bias."},
  {id:"v2d_d23", source:"V2-D", substrand:"V2 Substrand D2 · Building Models of Data", name:"D.2.3 Modeling Using Simulation", desc:"Build simulations to estimate probabilities, margins of error, and sampling variability, using them to differentiate real results from random chance."},
  {id:"v2d_d31", source:"V2-D", substrand:"V2 Substrand D3 · Using Models of Data", name:"D.3.1 Making Predictions with Models", desc:"Use models to make predictions about outcomes, understanding prediction quality and uncertainty."},
  {id:"v2d_d32", source:"V2-D", substrand:"V2 Substrand D3 · Using Models of Data", name:"D.3.2 Investigating Processes and Causal Relationships", desc:"Use models to investigate how processes work and explore causal relationships, separating correlation from causation."},
  {id:"v2d_d41", source:"V2-D", substrand:"V2 Substrand D4 · Evaluating Models of Data", name:"D.4.1 Quantifying Model Error", desc:"Compare model outputs with observed data to quantify error, recognizing that error can arise from unexplained variation, model bias, or overfitting to the training data."},
  {id:"v2d_d42", source:"V2-D", substrand:"V2 Substrand D4 · Evaluating Models of Data", name:"D.4.2 Evaluating Model Generalizability", desc:"Evaluate whether models and conclusions generalize beyond immediate samples to broader populations or contexts, understanding constraints and limitations of inference."},
  {id:"v2d_d43", source:"V2-D", substrand:"V2 Substrand D4 · Evaluating Models of Data", name:"D.4.3 Comparing and Improving Models", desc:"Use error analysis to compare models, evaluate their usefulness, and improve performance iteratively."},
  {id:"v1_c31", source:"V1", substrand:"V1 Substrand C3 · Variability in Data", name:"C.3.1 Describing Variability", desc:"Identify differences within data by sorting, grouping, and organizing characteristics. Use statistical and simulation methods to represent and analyze variability, connecting it to real-world uncertainty and probabilistic processes."},
  {id:"v1_c32", source:"V1", substrand:"V1 Substrand C3 · Variability in Data", name:"C.3.2 Comparing Variability", desc:"Examine differences between groups by analyzing measures of spread, such as range and standard deviation. Utilize visualizations like box plots and apply statistical methods to compare datasets, assess variability, and uncover patterns in data distributions and models."},
  {id:"v1_c33", source:"V1", substrand:"V1 Substrand C3 · Variability in Data", name:"C.3.3 Understanding Sources of Variability", desc:"Recognize measurement errors and natural variability in data. Assess data quality, identify outliers, and refine models using statistical and contextual analysis."},
  {id:"v1_c34", source:"V1", substrand:"V1 Substrand C3 · Variability in Data", name:"C.3.4 Variability in Our Computational World", desc:"Explore how AI model outputs vary based on training data, labeling, and bias. Understand how generative AI and pre-trained models use large datasets to make inferences and how variability in data impacts outcomes."},
  {id:"v1_d11", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.1 Probabilistic Language", desc:"When communicating with others, employ both plain-language and clear vocabulary to regularly describe degrees of uncertainty, both formally and informally as a thinking habit."},
  {id:"v1_d12", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.2 Priors and Updates", desc:"When encountering new data, integrate probabilistic thinking into everyday situations by explicating prior assumptions and the impact of new data/evidence on those assumptions."},
  {id:"v1_d13", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.3 Expected Value", desc:"When making a decision about uncertain outcomes in the future, integrate probabilistic thinking into everyday decisions by applying expected value (magnitude x probability) to appropriate situations."},
  {id:"v1_d14", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.4 Explaining Significance", desc:"Clearly describe the basic logic of statistical significance to others, differentiating between significance, the size of an effect, and the statistical power of an analysis. Recognize what statistical significance can reveal and cannot reveal about a phenomenon."},
  {id:"v1_d15", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.5 Sampling and Simulation", desc:"Comfortably identify the purpose of sampling and simulation for making arguments about data, and employ techniques using software to differentiate a real-data result from random chance or 'happenstance.'"},
  {id:"v1_d16", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.6 Correlation Versus Causation", desc:"Comfortably separate correlation from causation in a wide variety of situations, building a 'first-reaction' thinking habit over time."},
  {id:"v1_d17", source:"V1", substrand:"V1 Substrand D1 · Making and Justifying Claims", name:"D.1.7 Randomization", desc:"When identifying a potential cause of a phenomenon, clearly describe the usefulness of randomization for constructing an argument with data."},
  {id:"ah_c11", source:"A+H", substrand:"A+H Strand C · Visualizing Data", name:"C.1.1 Visualizing Single Variable Distributions", desc:"Create and interpret visualizations of single variable distributions, including categorical data (by location, color, bar chart), numerical data (dot plots, box plots, histograms), distinguishing between case-value plots and frequency/bar charts, and exploring how binning choices affect interpretation."},
  {id:"ah_c12", source:"A+H", substrand:"A+H Strand C · Visualizing Data", name:"C.1.2 Visualizing Multiple Variables", desc:"Create and interpret visualizations that reveal relationships among multiple variables: line plots with categorical coloring, time-series graphs, maps, parallel boxplots/histograms, two-way tables, scatterplots (with optional color for a third variable), heatmaps, and complex multi-variable media visualizations."},
  {id:"ah_c21", source:"A+H", substrand:"A+H Strand C · Describing and Modeling Data", name:"C.2.1 Using Measures to Characterize Signal and Noise — Single Variable", desc:"Use measures of center and spread to describe what is typical (signal) and how much values vary (noise) in a distribution. Progress from counts and modes (K-2) through median and range (3-5), mean/SD/IQR (6-8), formal outlier identification (9-10), to distribution comparisons against standard probability distributions (11-12)."},
  {id:"ah_c22", source:"A+H", substrand:"A+H Strand C · Describing and Modeling Data", name:"C.2.2 Using Measures and Models to Characterize Relationships Among Variables", desc:"Use numerical summaries and lightweight models to describe relationships between variables and distinguish signal from noise. Includes informal association (K-2/3-5), measures of center for group comparisons (6-8), correlation coefficients and residuals (9-10), two-way table analysis and Simpson's Paradox (11-12)."},
  {id:"kt_c11", source:"K+T", substrand:"K+T Strand C · Single Variable", name:"C.1.1 Describing Single Variable Distributions", desc:"Describe single variable distributions including shape, center, spread, clusters, and gaps. Explicitly addresses the misconception that all data is numeric, connects variability to uncertainty, and restores the V1 link between distributional shape and probabilistic processes (e.g., dice, random draw)."},
  {id:"kt_c12", source:"K+T", substrand:"K+T Strand C · Single Variable", name:"C.1.2 Visualizing Single Variable Distributions", desc:"Create and interpret visualizations of single variable distributions. Restores scatterplot at 6-8 (originally V1 6-8.C.2.3b, lost in V2)."},
  {id:"kt_c21", source:"K+T", substrand:"K+T Strand C · Multi-variable", name:"C.2.1 Investigating Questions about Single Variables", desc:"Use appropriate numerical and graphical summaries to reason about questions about single variables in context, including how data interpretation varies across disciplinary and community perspectives."},
  {id:"kt_c22", source:"K+T", substrand:"K+T Strand C · Multi-variable", name:"C.2.2 Describing and Visualizing Multivariate Relationships", desc:"Split V2's combined C.2.1 into separate describing and visualizing concepts. Dissolves C3 investigating substrands back into C1/C2 rather than keeping them standalone. Includes Simpson's Paradox at 11-12."},
];
const STRAND_C = {
  substrands: [
    { id:"c1", label:"C1. Visualizing Data", color:"#1B6CA8", lightColor:"#E8F2FB",
      zones:[
        { id:"c1_single", label:"C1a · Single Variable", desc:"" },
        { id:"c1_multi",  label:"C1b · Multiple Variables", desc:"" },
      ]
    },
    { id:"c2", label:"C2. Summarizing Data", color:"#1A7A4A", lightColor:"#E6F5EE",
      zones:[
        { id:"c2_single", label:"C2a · Single Variable", desc:"" },
        { id:"c2_multi",  label:"C2b · Multiple Variables", desc:"" },
      ]
    },
    { id:"c3", label:"C3. Interpreting Variability", color:"#7B3FA0", lightColor:"#F3EBF9",
      zones:[
        { id:"c3a", label:"C3a · Natural & Measurement Variability", desc:"Where does the spread come from? Is this point erroneous or meaningful?" },
        { id:"c3b", label:"C3b · Sampling Variability & Informal Inference", desc:"Does this difference reflect something real, or just chance?" },
      ]
    },
  ]
};

const OTHER = [
  { id:"strand_a", label:"Strand A", color:"#64748B", lightColor:"#F5F5F5", desc:"Dispositions, ethics, data types, investigative process" },
  { id:"strand_b", label:"Strand B", color:"#64748B", lightColor:"#F5F5F5", desc:"Collection, curation, data cleaning" },
  { id:"strand_d", label:"Strand D", color:"#C0392B", lightColor:"#FDEDED", desc:"Formal models, prediction, inference, probability distributions" },
  { id:"strand_e", label:"Strand E", color:"#64748B", lightColor:"#F5F5F5", desc:"Visualization communication, data stories" },
  { id:"cut",      label:"Cut / Redundant", color:"#92400E", lightColor:"#FEF3C7", desc:"Already covered elsewhere or not needed in new structure" },
];

const SOURCE_COLOR = {"V2-C":"#1B6CA8","V2-D":"#C0392B","V1":"#6B5B00","A+H":"#1A7A4A","K+T":"#7B3FA0"};


const CUSTOM_CONCEPTS = [1,2,3,4,5].map(i => ({
  id: `custom_${i}`,
  source: 'CUSTOM',
  substrand: 'Write-in concept',
  name: '',
  desc: '',
  custom: true,
}));

// ── STATE ────────────────────────────────────────────────────────────────────
const ALL_CONCEPTS = [...CONCEPTS, ...CUSTOM_CONCEPTS];
const placements = {};
let dragId = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const placed = Object.keys(placements).length;
  const total = ALL_CONCEPTS.length;
  document.getElementById('placed-count').textContent = placed;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pct').textContent = Math.round(placed/total*100) + '%';
}

function getSearch()  { return document.getElementById('search').value.toLowerCase(); }
function getSource()  { return document.getElementById('filter-source').value; }

function makeCard(c, inZone) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = c.id;

  const sc = c.custom ? '#E8A020' : (SOURCE_COLOR[c.source] || '#888');
  if (c.custom) {
    div.classList.add('card-custom');
    div.draggable = false; // re-enabled once name is entered
    div.innerHTML = `
      <div class="card-top">
        <span class="badge badge-custom">WRITE-IN</span>
      </div>
      <input class="card-input" placeholder="Concept name..." value="${c.name}"/>
      <textarea class="card-textarea" placeholder="Optional description..." rows="2">${c.desc}</textarea>
      ${inZone ? '<button class="card-return">← Return to queue</button>' : ''}
    `;
    const nameInput = div.querySelector('.card-input');
    const descInput = div.querySelector('.card-textarea');
    // Update data on input
    nameInput.addEventListener('input', e => {
      c.name = e.target.value.trim();
      c.substrand = c.name ? 'Write-in concept' : 'Write-in concept';
      div.draggable = !!c.name;
    });
    descInput.addEventListener('input', e => { c.desc = e.target.value; });
    // Stop drag from firing while typing
    nameInput.addEventListener('mousedown', e => e.stopPropagation());
    descInput.addEventListener('mousedown', e => e.stopPropagation());
    nameInput.addEventListener('dragstart', e => e.preventDefault());
    descInput.addEventListener('dragstart', e => e.preventDefault());
    // Enable dragging once name filled
    if (c.name) div.draggable = true;
  } else {
    div.innerHTML = `
      <div class="card-top">
        <span class="badge" style="background:${sc}">${c.source}</span>
      </div>
      <div class="card-substrand">${c.substrand}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      ${inZone ? '<button class="card-return">← Return to queue</button>' : ''}
    `;
  }

  div.addEventListener('dragstart', () => {
    dragId = c.id;
    setTimeout(() => div.classList.add('dragging'), 0);
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    dragId = null;
  });

  if (inZone) {
    div.querySelector('.card-return').addEventListener('click', e => {
      e.stopPropagation();
      delete placements[c.id];
      updateProgress();
      renderQueue();
      renderZones();
    });
  }
  return div;
}

// ── QUEUE ─────────────────────────────────────────────────────────────────────
function renderQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML = '';
  const s = getSearch(), src = getSource();

  const visible = ALL_CONCEPTS.filter(c => {
    if (placements[c.id]) return false;
    if (s && !c.name.toLowerCase().includes(s) && !c.desc.toLowerCase().includes(s) && !c.substrand.toLowerCase().includes(s)) return false;
    if (src && c.source !== src && c.source !== 'CUSTOM') return false;
    return true;
  });

  document.getElementById('remaining').textContent = `(${visible.length} remaining)`;

  if (!visible.length) {
    const msg = document.createElement('div');
    msg.style.cssText = 'color:#888;font-size:12px;padding:16px;text-align:center';
    msg.textContent = Object.keys(placements).length === ALL_CONCEPTS.length ? '🎉 All concepts placed!' : 'No concepts match filter.';
    list.appendChild(msg);
    return;
  }
  visible.forEach(c => list.appendChild(makeCard(c, false)));
}

// ── ZONE ──────────────────────────────────────────────────────────────────────
function makeZone(zoneId, label, desc, color, hasBorder) {
  const div = document.createElement('div');
  div.className = 'zone';
  div.dataset.zone = zoneId;
  if (hasBorder) div.style.borderRight = `1px solid ${color}30`;

  div.innerHTML = `
    <div class="zone-label" style="color:${color}">${label}</div>
    ${desc ? `<div class="zone-desc">${desc}</div>` : ''}
    <div class="zone-items"></div>
    <div class="zone-empty">drag concepts here</div>
  `;

  div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('over'); });
  div.addEventListener('dragleave', () => div.classList.remove('over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('over');
    if (dragId) {
      placements[dragId] = zoneId;
      updateProgress();
      renderQueue();
      renderZones();
    }
  });
  return div;
}

// ── RENDER ZONES ──────────────────────────────────────────────────────────────
function renderZones() {
  const strandEl = document.getElementById('strand-c-zones');
  strandEl.innerHTML = '';

  STRAND_C.substrands.forEach(sub => {
    const block = document.createElement('div');
    block.className = 'substrand-block';

    const count = sub.zones.reduce((a,z) => a + ALL_CONCEPTS.filter(c => placements[c.id] === z.id).length, 0);
    const hdr = document.createElement('div');
    hdr.className = 'substrand-header';
    hdr.style.background = sub.color;
    hdr.innerHTML = `<span>${sub.label}</span><span style="font-size:11px;font-weight:400;opacity:.8">${count} concept${count===1?'':'s'}</span>`;
    block.appendChild(hdr);

    const row = document.createElement('div');
    row.className = 'zones-row';
    row.style.gridTemplateColumns = `repeat(${sub.zones.length},1fr)`;

    sub.zones.forEach((zone, zi) => {
      const zEl = makeZone(zone.id, zone.label, zone.desc, sub.color, zi < sub.zones.length - 1);
      const items = ALL_CONCEPTS.filter(c => placements[c.id] === zone.id);
      const itemsEl = zEl.querySelector('.zone-items');
      const emptyEl = zEl.querySelector('.zone-empty');
      items.forEach(c => itemsEl.appendChild(makeCard(c, true)));
      emptyEl.style.display = items.length ? 'none' : 'block';
      row.appendChild(zEl);
    });

    block.appendChild(row);
    strandEl.appendChild(block);
  });

  // Other buckets
  const otherEl = document.getElementById('other-zones');
  otherEl.innerHTML = '';
  OTHER.forEach((b, bi) => {
    const zEl = makeZone(b.id, b.label, b.desc, b.color, bi % 3 !== 2);
    zEl.style.minHeight = '80px';
    const items = ALL_CONCEPTS.filter(c => placements[c.id] === b.id);
    const itemsEl = zEl.querySelector('.zone-items');
    const emptyEl = zEl.querySelector('.zone-empty');
    items.forEach(c => itemsEl.appendChild(makeCard(c, true)));
    emptyEl.style.display = items.length ? 'none' : 'block';
    otherEl.appendChild(zEl);
  });
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const rows = [['Concept ID','Source','Original Substrand','Concept Name','Description','Placed In']];
  ALL_CONCEPTS.forEach(c => {
    rows.push([c.id, c.source, c.substrand, c.name, c.desc, placements[c.id] || 'UNPLACED']);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'strand_c_concept_sorting.csv';
  a.click();
});

// ── FILTERS ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderQueue);
document.getElementById('filter-source').addEventListener('change', renderQueue);

// ── INIT ──────────────────────────────────────────────────────────────────────
updateProgress();
renderQueue();
renderZones();
</script>
</body>
</html>
