  </style>
</head>

  {id:"v2d_d12_35a", grade:"3-5", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Recognize that computers can learn those rules from data rather than having them programmed in explicitly."},
  {id:"v2d_d12_35b", grade:"3-5", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Recognize that inputs and outputs can be organized into structured relationships that follow consistent rules and are readable by machines."},
  {id:"v2d_d12_68", grade:"6-8", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Describe in plain language how AI uses structured data, including the categorical and numerical data types, to identify patterns and make predictions."},
  {id:"v2d_d12_910a", grade:"9-10", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Describe the basic mathematical structure of predictive models (including statistical and AI models) in terms of inputs, outputs, and how the relationship between them is estimated from data."},
  {id:"v2d_d12_910b", grade:"9-10", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Identify how biases in training data can lead to biases in AI models."},
  {id:"v2d_d12_1112a", grade:"11-12", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Identify and compare prediction approaches across model types, including regression, classification, and basic AI models."},
  {id:"v2d_d12_1112b", grade:"11-12", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Understand that algorithms use cost functions to measure errors and adjust predictions."},
  {id:"v2d_d12_1112c", grade:"11-12", source:"V2-D", concept:"V2 D1.2 Models as Mathematical Relationships", text:"Evaluate which modeling approach is most appropriate for a given problem, considering the structure of the data, the question being asked, and the tradeoffs between model types."},
  {id:"v2d_d13_k2a", grade:"K-2", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Recognize that some situations are not binary and find vocabulary to describe them (always, sometimes, never)."},
  {id:"v2d_d13_k2b", grade:"K-2", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Discuss a guess before an investigation and compare it to findings."},
  {id:"v2d_d13_35a", grade:"3-5", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Formulate a guess and identify vocabulary to convey confidence level."},
  {id:"v2d_d13_35b", grade:"3-5", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Record a guess, compare it to new findings, and assess how the assumption should change."},
  {id:"v2d_d13_35c", grade:"3-5", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Understand that distributions represent how often specific outcomes occur."},
  {id:"v2d_d13_68a", grade:"6-8", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Express a finding and quantify confidence by stating degree of certainty."},
  {id:"v2d_d13_68b", grade:"6-8", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Recognize that assumptions should change based on strength of new evidence."},
  {id:"v2d_d13_68c", grade:"6-8", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Connect previous assumptions to certainty in findings using terms \"prior assumption,\" \"new evidence,\" and \"updated assumption.\""},
  {id:"v2d_d13_910a", grade:"9-10", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Describe probability distributions and give real-world examples of different types of random events."},
  {id:"v2d_d13_910b", grade:"9-10", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Use probability models to assess how likely observed outcomes are compared to chance."},
  {id:"v2d_d13_1112a", grade:"11-12", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Understand and interpret variability in sampling distributions and how it impacts population estimates."},
  {id:"v2d_d13_1112b", grade:"11-12", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Describe conditional probability (e.g. Bayes Theorem) and how it relates to updating beliefs with new evidence."},
  {id:"v2d_d13_1112c", grade:"11-12", source:"V2-D", concept:"V2 D1.3 Probability Distributions as Models", text:"Apply Bayesian reasoning to evaluate how to update prior assumptions when new evidence becomes available."},
  {id:"v2d_d21_k2a", grade:"K-2", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Articulate simple rules for sorting."},
  {id:"v2d_d21_k2b", grade:"K-2", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Classify objects based on observed similarities and characteristics."},
  {id:"v2d_d21_k2c", grade:"K-2", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Extend simple patterns based on observable characteristics."},
  {id:"v2d_d21_35a", grade:"3-5", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Predict whether an object belongs to a group based on its characteristics."},
  {id:"v2d_d21_35b", grade:"3-5", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Distinguish patterns from relationships in data."},
  {id:"v2d_d21_68a", grade:"6-8", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Identify relationships between variables and represent them using mathematical or computational models such as tables, graphs, or equations."},
  {id:"v2d_d21_68b", grade:"6-8", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Use simple mathematical or computational models to describe patterns and relationships."},
  {id:"v2d_d21_68c", grade:"6-8", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Test and refine models by comparing predictions to actual data values."},
  {id:"v2d_d21_910a", grade:"9-10", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Construct and analyze models to represent linear and non-linear relationships."},
  {id:"v2d_d21_910b", grade:"9-10", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Use technology to create, test, and refine the models, including linear and non-linear models."},
  {id:"v2d_d21_910c", grade:"9-10", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Differentiate query-based, hypothesis-based, and causal questions and explain how each calls for a different modeling approach."},
  {id:"v2d_d21_910d", grade:"9-10", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Assess query-based questions by building models that estimate values within acceptable certainty thresholds."},
  {id:"v2d_d21_910e", grade:"9-10", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Assess hypothesis-based questions by building models that evaluate whether observed outcomes are likely due to chance."},
  {id:"v2d_d21_1112a", grade:"11-12", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Develop models that incorporate multiple variables and consider interaction effects (e.g. those modeled in multiple regression)."},
  {id:"v2d_d21_1112b", grade:"11-12", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Use computational methods or machine learning techniques to build and refine models."},
  {id:"v2d_d21_1112c", grade:"11-12", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Assess assumptions, limitations, and biases in models."},
  {id:"v2d_d21_1112d", grade:"11-12", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Develop causal diagrams to map relationships among variables."},
  {id:"v2d_d21_1112e", grade:"11-12", source:"V2-D", concept:"V2 D2.1 Building Models — Quantitative", text:"Use technology to compute confidence intervals and p-values that can be used to assess model parameters (e.g., the slope of a linear regression model)."},
  {id:"v2d_d22_k2a", grade:"K-2", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Articulate simple rules for sorting."},
  {id:"v2d_d22_k2b", grade:"K-2", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Classify objects based on observed similarities."},
  {id:"v2d_d22_35", grade:"3-5", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Predict whether an object belongs to a group based on characteristics."},
  {id:"v2d_d22_68a", grade:"6-8", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Identify relationships between variables and represent them using tables, graphs, or diagrams."},
  {id:"v2d_d22_68b", grade:"6-8", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Use simple models to describe patterns and relationships."},
  {id:"v2d_d22_68c", grade:"6-8", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Test and refine models by comparing predictions to actual values."},
  {id:"v2d_d22_910a", grade:"9-10", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Construct and analyze models to represent relationships in categorical data."},
  {id:"v2d_d22_910b", grade:"9-10", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Use technology to create, test, and refine models."},
  {id:"v2d_d22_1112a", grade:"11-12", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Analyze how characteristics of training data affect model predictions for different subgroups."},
  {id:"v2d_d22_1112b", grade:"11-12", source:"V2-D", concept:"V2 D2.2 Building Models — Categorical", text:"Evaluate strategies for mitigating training data bias."},
  {id:"v2d_d23_k2a", grade:"K-2", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Describe characteristics of a population and recognize that variability exists."},
  {id:"v2d_d23_k2b", grade:"K-2", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Describe events as likely or unlikely."},
  {id:"v2d_d23_35a", grade:"3-5", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Recognize that a sample may or may not reflect the entire group."},
  {id:"v2d_d23_35b", grade:"3-5", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Relate the effect of repeated samples to representativeness."},
  {id:"v2d_d23_68a", grade:"6-8", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Evaluate how sampling methods impact accurate representation of a population."},
  {id:"v2d_d23_68b", grade:"6-8", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Assess how sample size impacts accuracy of estimates."},
  {id:"v2d_d23_68c", grade:"6-8", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Identify sources of potential bias and describe how bias may impact results."},
  {id:"v2d_d23_910a", grade:"9-10", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Use simulations to determine whether results are likely due to something other than random chance."},
  {id:"v2d_d23_910b", grade:"9-10", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Answer probabilistic questions resulting from simulations."},
  {id:"v2d_d23_1112a", grade:"11-12", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Use simulation-based inferential methods to draw conclusions from datasets."},
  {id:"v2d_d23_1112b", grade:"11-12", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Identify why simulation can be used to infer conclusions referencing the Law of Large Numbers."},
  {id:"v2d_d23_1112c", grade:"11-12", source:"V2-D", concept:"V2 D2.3 Modeling Using Simulation", text:"Estimate confidence intervals and p-values from simulations."},
  {id:"v2d_d31_k2", grade:"K-2", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Identify whether a pattern applies to another situation."},
  {id:"v2d_d31_35a", grade:"3-5", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Use a simple model or pattern to predict what might happen in a new situation."},
  {id:"v2d_d31_35b", grade:"3-5", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Recognize that predictions can be more or less certain depending on similarity to original data."},
  {id:"v2d_d31_68a", grade:"6-8", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Use models to make predictions."},
  {id:"v2d_d31_68b", grade:"6-8", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Compare predicted values to actual observed values."},
  {id:"v2d_d31_68c", grade:"6-8", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Identify factors that make predictions more or less reliable."},
  {id:"v2d_d31_910a", grade:"9-10", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Generate point predictions and prediction intervals to communicate expected outcomes and plausible ranges."},
  {id:"v2d_d31_910b", grade:"9-10", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Use digital tools to make predictions from models and visualize prediction uncertainty."},
  {id:"v2d_d31_910c", grade:"9-10", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Use Expected Value calculations to compare scenarios involving multiple trials."},
  {id:"v2d_d31_1112a", grade:"11-12", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Construct and interpret prediction intervals for individual observations."},
  {id:"v2d_d31_1112b", grade:"11-12", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Create and use expected value models to support decision-making."},
  {id:"v2d_d31_1112c", grade:"11-12", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Evaluate prediction accuracy using appropriate metrics."},
  {id:"v2d_d31_1112d", grade:"11-12", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Communicate predictions responsibly by stating assumptions, quantifying uncertainty, and acknowledging limitations."},
  {id:"v2d_d31_1112e", grade:"11-12", source:"V2-D", concept:"V2 D3.1 Making Predictions", text:"Use simulations to build a distribution of possible outcomes, and evaluate results using expected value, confidence intervals, or p-values depending on the question being asked."},
  {id:"v2d_d32_35", grade:"3-5", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Informally assess whether there is an association between two phenomena in a visualization."},
  {id:"v2d_d32_68a", grade:"6-8", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Assess simple data to identify potential associations while recognizing that correlation does not imply causation."},
  {id:"v2d_d32_68b", grade:"6-8", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Identify and categorize types of relationships between numerical variables (independent, dependent, covariate)."},
  {id:"v2d_d32_910a", grade:"9-10", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Recognize that randomized experiments best establish evidence for causation."},
  {id:"v2d_d32_910b", grade:"9-10", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Identify spurious correlations and explore other potential causes."},
  {id:"v2d_d32_1112a", grade:"11-12", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Independently identify examples where two dependent variables are both influenced by a third variable."},
  {id:"v2d_d32_1112b", grade:"11-12", source:"V2-D", concept:"V2 D3.2 Causal Relationships", text:"Analyze how spurious correlations relate to claims and AI recommendations."},
  {id:"v2d_d41_35", grade:"3-5", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Identify potential sources of natural variability based on knowledge of the data context."},
  {id:"v2d_d41_68", grade:"6-8", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Relate sources of variability to domain-specific phenomena."},
  {id:"v2d_d41_910a", grade:"9-10", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Identify common ways to measure how well a model fits data, such as mean squared error or mean absolute error for quantitative outcomes, or accuracy for classification."},
  {id:"v2d_d41_910b", grade:"9-10", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Consider context and dataset characteristics to determine measurement error."},
  {id:"v2d_d41_1112a", grade:"11-12", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Analyze error patterns to assess model performance using residual plots or confusion matrices."},
  {id:"v2d_d41_1112b", grade:"11-12", source:"V2-D", concept:"V2 D4.1 Quantifying Model Error", text:"Use insights from error analysis to improve models."},
  {id:"v2d_d42_k2", grade:"K-2", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Recognize that what we learn from one group might not always be true for other groups."},
  {id:"v2d_d42_35a", grade:"3-5", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Explain how findings from a small group might or might not apply to a bigger group."},
  {id:"v2d_d42_35b", grade:"3-5", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Identify reasons why patterns in one dataset might not appear in another."},
  {id:"v2d_d42_68a", grade:"6-8", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Evaluate whether a sample is representative enough to draw conclusions about a larger population."},
  {id:"v2d_d42_68b", grade:"6-8", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Identify factors that limit how broadly findings can be applied."},
  {id:"v2d_d42_68c", grade:"6-8", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Revise assumptions or modeling choices when new data suggests findings don't generalize as expected."},
  {id:"v2d_d42_910a", grade:"9-10", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Evaluate how sampling methods and study design determine which populations and contexts a model's conclusions can extend to."},
  {id:"v2d_d42_910b", grade:"9-10", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Identify potential threats to generalizability (selection bias, measurement differences, contextual factors)."},
  {id:"v2d_d42_910c", grade:"9-10", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Document scope and limitations of conclusions, clearly stating to whom findings apply."},
  {id:"v2d_d42_1112a", grade:"11-12", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Evaluate whether causal claims from experiments generalize beyond the experimental context."},
  {id:"v2d_d42_1112b", grade:"11-12", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Evaluate whether a model built on one population or context produces valid conclusions when applied to a different population, setting, or time period."},
  {id:"v2d_d42_1112c", grade:"11-12", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Design strategies to test whether findings hold in new contexts by applying models to independent datasets or replicating key analyses."},
  {id:"v2d_d42_1112d", grade:"11-12", source:"V2-D", concept:"V2 D4.2 Model Generalizability", text:"Recognize when findings from one study are insufficient to establish broad claims."},
  {id:"v2d_d43_k2", grade:"K-2", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Compare two simple sorting rules or predictions to see which works better and explain why."},
  {id:"v2d_d43_35a", grade:"3-5", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Test whether a pattern or rule works well by checking it against a new subset of the data and revise when it makes mistakes."},
  {id:"v2d_d43_35b", grade:"3-5", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Compare predictions from two different models applied to the same dataset to determine which is more accurate."},
  {id:"v2d_d43_68a", grade:"6-8", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Calculate how often a model makes correct predictions (accuracy) and use this to choose between classification models (e.g., kNN, decision trees) built from the same dataset."},
  {id:"v2d_d43_68b", grade:"6-8", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Test a model on new data that wasn't used to build it."},
  {id:"v2d_d43_910a", grade:"9-10", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Use multiple error metrics (e.g., precision, recall, F1 score) to evaluate and compare classification models."},
  {id:"v2d_d43_910b", grade:"9-10", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Apply cross-validation techniques to assess model performance and avoid overfitting."},
  {id:"v2d_d43_910c", grade:"9-10", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Analyze error metrics to identify patterns in model errors and suggest targeted improvements."},
  {id:"v2d_d43_910d", grade:"9-10", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Use technology to systematically test model variations and compare performance metrics to select the best approach."},
  {id:"v2d_d43_1112a", grade:"11-12", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Analyze confusion matrices and diagnostic tools to identify specific weaknesses and implement improvements."},
  {id:"v2d_d43_1112b", grade:"11-12", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Evaluate the trade-off between model complexity and performance (bias-variance tradeoff)."},
  {id:"v2d_d43_1112c", grade:"11-12", source:"V2-D", concept:"V2 D4.3 Comparing and Improving Models", text:"Design and execute model comparison frameworks — distinguishing between prediction models (e.g., linear regression, random forests) and classification models (e.g., logistic regression, decision trees) — to select the most appropriate approach for a given context."},
  {id:"v1_c31_68a", grade:"6-8", source:"V1", concept:"V1 C3.1 Describing Variability", text:"[V1 only] Identify probabilistic processes that simulate various forms of categorical variability, including uniform and normal distributions (e.g., spinner, dice, random draw)."},
  {id:"v1_c31_68b", grade:"6-8", source:"V1", concept:"V1 C3.1 Describing Variability", text:"[V1 only] Illustrate variability in a dataset by determining how key descriptive features are represented."},
  {id:"v1_c31_68c", grade:"6-8", source:"V1", concept:"V1 C3.1 Describing Variability", text:"[V1 only] Evaluate how visualizations, models, or predictions account for variation at an appropriate level."},
  {id:"v1_c31_910", grade:"9-10", source:"V1", concept:"V1 C3.1 Describing Variability", text:"[V1 only] Describe methods (statistical, simulation) to analyze variability in data and connect it to known or hypothesized processes in a specific domain."},
  {id:"v1_c31_1112", grade:"11-12", source:"V1", concept:"V1 C3.1 Describing Variability", text:"[V1 only] Apply statistical or simulation methods to model variability to explore uncertainty in real-world situations."},
  {id:"v1_c32_k2", grade:"K-2", source:"V1", concept:"V1 C3.2 Comparing Variability", text:"[V1 only] Describe how two things or groups are different from one another (e.g., more or less, bigger or smaller)."},
  {id:"v1_c32_35", grade:"3-5", source:"V1", concept:"V1 C3.2 Comparing Variability", text:"[V1 only] Understand how data varies by exploring spread (e.g., range) and comparing qualities (e.g., brightness or temperature)."},
  {id:"v1_c32_68", grade:"6-8", source:"V1", concept:"V1 C3.2 Comparing Variability", text:"[V1 only] Use visualizations (e.g., box plots) to compare variability across datasets."},
  {id:"v1_c32_910", grade:"9-10", source:"V1", concept:"V1 C3.2 Comparing Variability", text:"[V1 only] Use simple statistics including mean, median, range, standard deviation, etc. to compare data distributions."},
  {id:"v1_c32_1112", grade:"11-12", source:"V1", concept:"V1 C3.2 Comparing Variability", text:"[V1 only] Explore variability through statistical methods, such as analyzing residuals or variance in linear models."},
  {id:"v1_c33_35a", grade:"3-5", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Identify and explain simple measurement error (e.g., different students get varying results when measuring the same object)."},
  {id:"v1_c33_35b", grade:"3-5", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Identify potential sources of natural variability in a given measure based on knowledge of the data context (e.g., plants can be different heights, grow taller over time, grow differently in different areas)."},
  {id:"v1_c33_68a", grade:"6-8", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Consider both context and dataset characteristics to determine whether a given data point is reasonable (e.g., meaningful outlier vs. erroneous outlier)."},
  {id:"v1_c33_68b", grade:"6-8", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Relate sources of variability to domain-specific phenomena as described in relevant domain standards (e.g., NGSS, Math CCSS, C3 Framework)."},
  {id:"v1_c33_910a", grade:"9-10", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Consider variability as a key component of informal inference by questioning whether observed differences are meaningful or not (e.g., phone battery 6 hours one day vs 4 the next — real difference or normal variation?)."},
  {id:"v1_c33_910b", grade:"9-10", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Identify categorical options for measuring 'best' fit from data points to provided estimates (e.g., line or curve for a scatterplot, mean for a distribution)."},
  {id:"v1_c33_910c", grade:"9-10", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Consider both context and characteristics of a dataset to determine how 'messy' it may be due to measurement error (e.g., faulty sensors, inaccurate measurements)."},
  {id:"v1_c33_1112a", grade:"11-12", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Estimate and describe errors between predictions and actual outcomes (e.g., residuals, misclassification rates)."},
  {id:"v1_c33_1112b", grade:"11-12", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Analyze error patterns to assess model performance (e.g., residual plot, confusion matrix)."},
  {id:"v1_c33_1112c", grade:"11-12", source:"V1", concept:"V1 C3.3 Sources of Variability", text:"[V1 only] Use insights from error analysis to improve the model (e.g., add a variable, use a curve; in classification, balance groups or adjust the cutoff)."},
  {id:"v1_c34_68a", grade:"6-8", source:"V1", concept:"V1 C3.4 Variability in Computational World", text:"[V1 only] Conceptualize how the output of AI models such as LLMs vary along a variety of dimensions."},
  {id:"v1_c34_68b", grade:"6-8", source:"V1", concept:"V1 C3.4 Variability in Computational World", text:"[V1 only] Determine how labeling happens and how it affects the variability of the output of models (e.g., training set that labels dogs vs. cats, connections to bias)."},
  {id:"v1_c34_910", grade:"9-10", source:"V1", concept:"V1 C3.4 Variability in Computational World", text:"[V1 only] Acknowledge how variability in the training data for generative AI influences bias in its output (e.g., facial recognition, ownership of DNA data)."},
  {id:"v1_c34_1112", grade:"11-12", source:"V1", concept:"V1 C3.4 Variability in Computational World", text:"[V1 only] Appreciate that many AI tools are pre-trained with large quantities of data so that inferences can be drawn on smaller sample sizes."},
  {id:"v1_d11_k2", grade:"K-2", source:"V1", concept:"V1 D1.1 Probabilistic Language", text:"[V1 only] Recognize that some situations are not binary and find appropriate vocabulary (e.g., 'always,' 'sometimes,' 'never')."},
  {id:"v1_d11_35", grade:"3-5", source:"V1", concept:"V1 D1.1 Probabilistic Language", text:"[V1 only] Formulate a guess or hypothesis and identify informal vocabulary to convey your level of confidence."},
  {id:"v1_d11_68", grade:"6-8", source:"V1", concept:"V1 D1.1 Probabilistic Language", text:"[V1 only] Express a finding and quantify your confidence in it by stating the degree of certainty regarding the result."},
  {id:"v1_d11_910", grade:"9-10", source:"V1", concept:"V1 D1.1 Probabilistic Language", text:"[V1 only] Clearly state a result or finding and indicate the level of certainty regarding a formal statistical concept alongside an informal evaluation of the likelihood of the event."},
  {id:"v1_d14_35", grade:"3-5", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Describe how 'unusual' a result may be compared to an otherwise expected outcome (e.g., flipping a coin 10 times and getting 10 heads is highly unlikely)."},
  {id:"v1_d14_68a", grade:"6-8", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Recognize and describe random chance in a given situation, and explain whether a result is unusual by comparing it to what is expected from random chance."},
  {id:"v1_d14_68b", grade:"6-8", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Recognize that a unique result may be considered significant if it falls far from the typical range of outcomes in a visualized distribution of results."},
  {id:"v1_d14_910a", grade:"9-10", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Identify situations when distinguishing from random chance is especially important (e.g., medical drug trial, public policy implementation)."},
  {id:"v1_d14_910b", grade:"9-10", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Describe probability distributions and give real-world examples of how they can represent different types of random events."},
  {id:"v1_d14_910c", grade:"9-10", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Identify and describe a normal distribution as a possible model for random chance that can be used to determine whether a result is statistically significant."},
  {id:"v1_d14_1112a", grade:"11-12", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Explain the concept of statistical significance in plain language and its limitations (e.g., inability to address study design flaws, confounding variables, or real-world validity)."},
  {id:"v1_d14_1112b", grade:"11-12", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Describe how statistical significance tests are constructed, calculated, and interpreted in the context of chosen probability models."},
  {id:"v1_d14_1112c", grade:"11-12", source:"V1", concept:"V1 D1.4 Explaining Significance", text:"[V1 only] Differentiate statistical significance, effect size, and statistical power in simple terms with real-world examples."},
  {id:"v1_d15_k2a", grade:"K-2", source:"V1", concept:"V1 D1.5 Sampling & Simulation", text:"[V1 only] Describe characteristics of a population and recognize that variability exists within any population (e.g., jelly beans in a jar)."},
  {id:"v1_d15_k2b", grade:"K-2", source:"V1", concept:"V1 D1.5 Sampling & Simulation", text:"[V1 only] Describe events as either likely or unlikely (e.g., pulling a purple jelly bean out of a jar with mostly red jelly beans)."},
  {id:"v1_d15_35b", grade:"3-5", source:"V1", concept:"V1 D1.5 Sampling & Simulation", text:"[V1 only] Relate the effect of repeated samples to the representativeness of an entire group (e.g., pulling 10 jellybeans 5 times gives a better estimate than one handful)."},
  {id:"v1_d15_68d", grade:"6-8", source:"V1", concept:"V1 D1.5 Sampling & Simulation", text:"[V1 only] Describe what it means for an event to be likely or unlikely using probability (e.g., probability of 0 is unlikely, 1 is very likely, 1/2 is neither)."},
  {id:"ah_c11_k2a", grade:"K-2", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Create visualizations of categorical data where each case is a person or an object (by location, piled up, by color). May be on paper or use actual objects/people."},
  {id:"ah_c11_k2b", grade:"K-2", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Arrange numerical data in order along a number line. Cases may be indicated by pictures, icons or the objects themselves."},
  {id:"ah_c11_35a", grade:"3-5", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Visualize numerical data as a dot plot on a number line, with identical values piled up."},
  {id:"ah_c11_35b", grade:"3-5", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Visualize categorical data so that categories can be easily compared (e.g. with a bar chart in which each case takes up the same amount of space)."},
  {id:"ah_c11_35c", grade:"3-5", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Distinguish between a case value plot (each bar = one case, height = value) and a bar chart (each bar = a category, height = frequency of cases in that category)."},
  {id:"ah_c11_68a", grade:"6-8", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Visualize numerical data as a box plot, with or without individual cases shown."},
  {id:"ah_c11_68b", grade:"6-8", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Visualize numerical data as a histogram with values binned."},
  {id:"ah_c11_68c", grade:"6-8", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Understand how different choices of binning impact a visualization."},
  {id:"ah_c11_68d", grade:"6-8", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Interpret single variable visualizations found in media (pie graphs, bar graphs, histograms). Identify what variable is being graphed and how it is represented."},
  {id:"ah_c11_910", grade:"9-10", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Explore how changes in axis limits and scale change a visualization."},
  {id:"ah_c11_1112", grade:"11-12", source:"A+H", concept:"A+H C1.1 Visualizing Single Variables", text:"[A/H] Visualize a numerical distribution superimposed with a standard probability distribution, such as the normal distribution."},
  {id:"ah_c12_k2a", grade:"K-2", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Visualize a case with several variables in a single image (e.g., a stuffed animal has fur color, number of legs, eye color)."},
  {id:"ah_c12_35a", grade:"3-5", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Create a line plot of numeric data where individual cases are colored by a categorical variable."},
  {id:"ah_c12_35b", grade:"3-5", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Create time series graphs that visualize changes in a quantitative measure over time, where time intervals are consistent and labeled."},
  {id:"ah_c12_68a", grade:"6-8", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Create parallel boxplots, histograms, or dotplots to compare a numeric variable across several groups."},
  {id:"ah_c12_68b", grade:"6-8", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Create two-way tables to visualize associations between two categorical attributes."},
  {id:"ah_c12_68c", grade:"6-8", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Create scatterplots for pairs of numerical variables and describe whether the relationship appears positive, negative, non-linear or absent."},
  {id:"ah_c12_910", grade:"9-10", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Visualize two numeric variables with a scatterplot and use color to represent a categorical variable for the points."},
  {id:"ah_c12_1112a", grade:"11-12", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Make sense of complex multivariable data visualizations that utilize color, size, and 2-3 dimensional space (interpret, not create — e.g. from media)."},
  {id:"ah_c12_1112b", grade:"11-12", source:"A+H", concept:"A+H C1.2 Visualizing Multiple Variables", text:"[A/H] Use a color scale to create a heatmap from a two-way table to visualize associations."},
  {id:"ah_c21_k2", grade:"K-2", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Count the number of cases in each category. Identify which category has most/least."},
  {id:"ah_c21_35a", grade:"3-5", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Identify most frequent values (modes), clumps, gaps and unusual values as characteristics of a distribution."},
  {id:"ah_c21_35b", grade:"3-5", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Find the median of a numerical distribution and notice how much other values deviate from it."},
  {id:"ah_c21_68", grade:"6-8", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Compare distributions in terms of variability, informally."},
  {id:"ah_c21_910", grade:"9-10", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Compare various measures of variability (standard deviation, IQR) in terms of what they indicate and what they hide."},
  {id:"ah_c21_1112", grade:"11-12", source:"A+H", concept:"A+H C2.1 Measures — Single Variable", text:"[A/H] Compare a data distribution with standard probability distributions to determine which is most similar."},
  {id:"ah_c22_k2", grade:"K-2", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Identify the pattern of change (increasing, decreasing, etc.) of numerical data over discrete time periods."},
  {id:"ah_c22_35", grade:"3-5", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Describe time-series trends and predict how they might continue."},
  {id:"ah_c22_68", grade:"6-8", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Use measures of center and variability in quantitative distributions to compare two or more groups."},
  {id:"ah_c22_910a", grade:"9-10", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Use correlation coefficients to measure the strength of association between two numeric variables."},
  {id:"ah_c22_910b", grade:"9-10", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Develop linear and non-linear models to describe relationships among two numeric variables. Use residuals and residual plots to measure and assess variation from the model."},
  {id:"ah_c22_910c", grade:"9-10", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Use the squared error, correlation, and coefficient of determination to describe variation and model fit for predictions."},
  {id:"ah_c22_1112a", grade:"11-12", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Use frequencies in a two-way table between two categorical variables to find the chance of different events occurring (marginal, conditional, joint, and union)."},
  {id:"ah_c22_1112b", grade:"11-12", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Use simulations (e.g., randomization or permutation tests) to investigate associations between categorical variables and significance of an event."},
  {id:"ah_c22_1112c", grade:"11-12", source:"A+H", concept:"A+H C2.2 Measures — Multiple Variables", text:"[A/H] Understand examples of Simpson's Paradox, where confounding variables impact the trends between two quantitative variables."},
  {id:"kt_c11_k2", grade:"K-2", source:"K+T", concept:"K+T C1.1 Describing Single Variable", text:"[K/T] Recognize that not all data is numeric — some data describes categories and cannot be averaged or ordered."},
  {id:"kt_c11_35a", grade:"3-5", source:"K+T", concept:"K+T C1.1 Describing Single Variable", text:"[K/T] Describe the number of clusters, symmetry, and gaps in distributions."},
  {id:"kt_c11_35b", grade:"3-5", source:"K+T", concept:"K+T C1.1 Describing Single Variable", text:"[K/T] Recognize that variability in a distribution contributes to uncertainty; the more spread out the data, the less certain we can be about any single predicted value."},
  {id:"kt_c11_68", grade:"6-8", source:"K+T", concept:"K+T C1.1 Describing Single Variable", text:"[K/T] Identify real-world processes that produce variability (such as rolling dice, drawing from a bag, or measuring natural phenomena) and connect the shape of the resulting distribution to the nature of that process."},
  {id:"kt_c12_68", grade:"6-8", source:"K+T", concept:"K+T C1.2 Visualizing Single Variable", text:"[K/T] Create scatterplots for pairs of numerical variables and describe whether the relationship appears positive, negative, or absent. (RESTORED from V1 6-8.C.2.3b)"},
  {id:"kt_c21_35", grade:"3-5", source:"K+T", concept:"K+T C2.1 Investigating Single Variable", text:"[K/T] Describe how data interpretation varies across a wide variety of contexts."},
  {id:"kt_c21_68", grade:"6-8", source:"K+T", concept:"K+T C2.1 Investigating Single Variable", text:"[K/T] Analyze data interpretations from various disciplinary and community perspectives."},
  {id:"kt_c22_68", grade:"6-8", source:"K+T", concept:"K+T C2.3 Investigating Multiple Variables", text:"[K/T] Use reasoning about distributions to compare two groups based on quantitative variables."},
  {id:"kt_simp", grade:"11-12", source:"K+T", concept:"K+T C2.3 Investigating Multiple Variables", text:"[K/T] Review examples of Simpson's Paradox in media and research studies."},
];
const GRADE_COLOR = { "K-2":"#E8733A", "3-5":"#1A7A4A", "6-8":"#1B6CA8", "9-10":"#7B3FA0", "11-12":"#C0392B" };
const SOURCE_COLOR = {"V2-C":"#1B6CA8", "V2-D":"#C0392B", "V1":"#6B5B00", "A+H":"#1A7A4A", "K+T":"#7B3FA0"};
const SOURCE_LABEL = {"V2-C":"V2-C", "V2-D":"V2-D", "V1":"V1", "A+H":"A+H", "K+T":"K+T"};

// ── STATE ────────────────────────────────────────────────────────────────────
const placements = {}; // id -> zoneId
let dragId = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const placed = Object.keys(placements).length;
  const total = COMPETENCIES.length;
  document.getElementById('placed-count').textContent = placed;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pct').textContent = Math.round(placed/total*100) + '%';
}

function getSearch() { return document.getElementById('search').value.toLowerCase(); }
function getGrade()  { return document.getElementById('filter-grade').value; }
function getSource() { return document.getElementById('filter-source').value; }

function makeCard(c, inZone) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = c.id;

  const gc = GRADE_COLOR[c.grade] || '#888';
  const sc = SOURCE_COLOR[c.source] || '#888';
  const sl = SOURCE_LABEL[c.source] || c.source;

  div.innerHTML = `
    <div class="card-badges">
      <span class="badge" style="background:${gc}">${c.grade}</span>
      <span class="badge" style="background:${sc}">${sl}</span>
      <span class="card-concept">${c.concept}</span>
    </div>
    <div class="card-text">${c.text}</div>
    ${inZone ? '<button class="card-return">&#8592; Return to queue</button>' : ''}
  `;

  div.addEventListener('dragstart', e => {
    dragId = c.id;
    setTimeout(() => div.classList.add('dragging'), 0);
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    dragId = null;
  });

  if (inZone) {
    div.querySelector('.card-return').addEventListener('click', e => {
      e.stopPropagation();
      delete placements[c.id];
      updateProgress();
      renderQueue();
      renderZones();
    });
  }
  return div;
}

// ── QUEUE ────────────────────────────────────────────────────────────────────
function renderQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML = '';
  const s = getSearch(), g = getGrade(), src = getSource();
  const visible = COMPETENCIES.filter(c => {
    if (placements[c.id]) return false;
    if (s && !c.text.toLowerCase().includes(s) && !c.concept.toLowerCase().includes(s)) return false;
    if (g && c.grade !== g) return false;
    if (src && c.source !== src) return false;
    return true;
  });
  document.getElementById('remaining').textContent = `(${visible.length} remaining)`;
  if (!visible.length) {
    const msg = document.createElement('div');
    msg.style.cssText = 'color:#888;font-size:12px;padding:16px;text-align:center';
    msg.textContent = Object.keys(placements).length === COMPETENCIES.length ? '🎉 All items placed!' : 'No items match filter.';
    list.appendChild(msg);
    return;
  }
  visible.forEach(c => list.appendChild(makeCard(c, false)));
}

// ── ZONES ────────────────────────────────────────────────────────────────────
function makeZone(zoneId, label, desc, color, lightColor, hasBorder) {
  const div = document.createElement('div');
  div.className = 'zone';
  div.dataset.zone = zoneId;
  if (hasBorder) div.style.borderRight = `1px solid ${color}30`;

  div.innerHTML = `
    <div class="zone-label" style="color:${color}">${label}</div>
    ${desc ? `<div class="zone-desc">${desc}</div>` : ''}
    <div class="zone-items"></div>
    <div class="zone-empty" style="display:none">drag items here</div>
  `;

  div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    if (dragId) {
      placements[dragId] = zoneId;
      updateProgress();
      renderQueue();
      renderZones();
    }
  });
  return div;
}

function renderZones() {
  // Strand C zones
  const strandEl = document.getElementById('strand-c-zones');
  strandEl.innerHTML = '';

  STRAND_C_TARGET.substrands.forEach(sub => {
    const block = document.createElement('div');
    block.className = 'substrand-block';

    const itemCount = sub.zones.reduce((a,z) => a + COMPETENCIES.filter(c => placements[c.id] === z.id).length, 0);
    const hdr = document.createElement('div');
    hdr.className = 'substrand-header';
    hdr.style.background = sub.color;
    hdr.innerHTML = `<span>${sub.label}</span><span style="font-size:11px;font-weight:400;opacity:.8">${itemCount} items</span>`;
    block.appendChild(hdr);

    const row = document.createElement('div');
    row.className = 'zones-row';
    row.style.gridTemplateColumns = `repeat(${sub.zones.length}, 1fr)`;
    sub.zones.forEach((zone, zi) => {
      const zEl = makeZone(zone.id, zone.label, '', sub.color, sub.lightColor, zi < sub.zones.length - 1);
      const items = COMPETENCIES.filter(c => placements[c.id] === zone.id);
      const itemsEl = zEl.querySelector('.zone-items');
      const emptyEl = zEl.querySelector('.zone-empty');
      items.forEach(c => itemsEl.appendChild(makeCard(c, true)));
      emptyEl.style.display = items.length ? 'none' : 'block';
      row.appendChild(zEl);
    });
    block.appendChild(row);
    strandEl.appendChild(block);
  });

  // Other zones
  const otherEl = document.getElementById('other-zones');
  otherEl.innerHTML = '';
  OTHER_BUCKETS.forEach((b, bi) => {
    const zEl = makeZone(b.id, b.label, b.desc, b.color, b.lightColor, bi % 3 !== 2);
    const items = COMPETENCIES.filter(c => placements[c.id] === b.id);
    const itemsEl = zEl.querySelector('.zone-items');
    const emptyEl = zEl.querySelector('.zone-empty');
    items.forEach(c => itemsEl.appendChild(makeCard(c, true)));
    emptyEl.style.display = items.length ? 'none' : 'block';
    zEl.style.minHeight = '80px';
    otherEl.appendChild(zEl);
  });
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const rows = [['Competency ID','Grade','Source','Original Concept','Text','Placed In']];
  COMPETENCIES.forEach(c => {
    rows.push([c.id, c.grade, c.source, c.concept, c.text, placements[c.id] || 'UNPLACED']);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'strand_c_sorting.csv';
  a.click();
});

// ── FILTERS ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderQueue);
document.getElementById('filter-grade').addEventListener('change', renderQueue);
document.getElementById('filter-source').addEventListener('change', renderQueue);

// ── INIT ─────────────────────────────────────────────────────────────────────
updateProgress();
renderQueue();
renderZones();
</script>
</body>
