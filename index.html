const GRADE_COLOR = { "K-2":"#E8733A", "3-5":"#1A7A4A", "6-8":"#1B6CA8", "9-10":"#7B3FA0", "11-12":"#C0392B" };
const SOURCE_COLOR = { "V1":"#6B5B00", "V1-D":"#8B2000", "V2":"#444", "V2-D":"#C0392B", "A+H":"#1B6CA8", "K+T":"#1A7A4A" };
const SOURCE_LABEL = { "V1":"V1-C", "V1-D":"V1-D", "V2":"V2-C", "V2-D":"V2-D", "A+H":"A+H", "K+T":"K+T" };

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [placements, setPlacements] = useState({});
  const [search, setSearch] = useState("");
  const [filterGrade, setFilterGrade] = useState("all");
  const [filterSource, setFilterSource] = useState("all");
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [showDone, setShowDone] = useState(false);

  const placed = new Set(Object.keys(placements));
  const unplaced = COMPETENCIES.filter(c => {
    if (placed.has(c.id)) return false;
    if (search && !c.text.toLowerCase().includes(search.toLowerCase()) && !c.concept.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterGrade !== "all" && c.grade !== filterGrade) return false;
    if (filterSource !== "all" && c.source !== filterSource) return false;
    return true;
  });

  const getZoneItems = (zoneId) =>
    COMPETENCIES.filter(c => placements[c.id] === zoneId);

  const handleDragStart = (id) => setDragId(id);
  const handleDragEnd = () => { setDragId(null); setDragOver(null); };
  const handleDragOver = (e, zoneId) => { e.preventDefault(); setDragOver(zoneId); };
  const handleDrop = (e, zoneId) => {
    e.preventDefault();
    if (dragId) {
      setPlacements(p => ({ ...p, [dragId]: zoneId }));
    }
    setDragOver(null);
  };
  const handleRemove = (id) => {
    setPlacements(p => { const n={...p}; delete n[id]; return n; });
  };

  const totalPlaced = Object.keys(placements).length;
  const totalItems = COMPETENCIES.length;
  const pct = Math.round((totalPlaced / totalItems) * 100);

  // Export
  const handleExport = () => {
    const rows = [["Competency ID","Grade","Source","Original Concept","Text","Placed In"]];
    COMPETENCIES.forEach(c => {
      rows.push([c.id, c.grade, c.source, c.concept, c.text, placements[c.id] || "UNPLACED"]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="strand_c_sorting.csv"; a.click();
  };

  return (
    <div style={{fontFamily:"system-ui, sans-serif", background:"#F4F6F8", minHeight:"100vh", display:"flex", flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"#1B2A4A", color:"#fff", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:18, fontWeight:700, letterSpacing:"-0.3px"}}>Strand C Restructuring — Competency Sorter</div>
          <div style={{fontSize:12, color:"#8EADD4", marginTop:2}}>Drag cards from the queue into the new Strand C structure (or other strands)</div>
        </div>
        <div style={{display:"flex", gap:10, alignItems:"center", flexWrap:"wrap"}}>
          <div style={{background:"#253659", borderRadius:8, padding:"6px 14px", fontSize:13}}>
            <span style={{color:"#8EADD4"}}>Placed: </span>
            <span style={{fontWeight:700}}>{totalPlaced}/{totalItems}</span>
            <span style={{color:"#8EADD4", marginLeft:6}}>{pct}%</span>
          </div>
          <button onClick={handleExport} style={{background:"#028090", border:"none", color:"#fff", borderRadius:8, padding:"7px 16px", fontSize:13, cursor:"pointer", fontWeight:600}}>
            ↓ Export CSV
          </button>
        </div>
      </div>

      <div style={{display:"flex", flex:1, overflow:"hidden", height:"calc(100vh - 62px)"}}>

        {/* LEFT: Queue */}
        <div style={{width:340, minWidth:280, background:"#fff", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", overflow:"hidden"}}>
          <div style={{padding:"14px 16px", borderBottom:"1px solid #E2E8F0"}}>
            <div style={{fontSize:13, fontWeight:700, color:"#1B2A4A", marginBottom:10}}>
              Competency Queue <span style={{color:"#888", fontWeight:400, fontSize:12}}>({unplaced.length} remaining)</span>
            </div>
            <input
              placeholder="Search..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{width:"100%", border:"1px solid #D1D5DB", borderRadius:6, padding:"6px 10px", fontSize:12, marginBottom:8, boxSizing:"border-box"}}
            />
            <div style={{display:"flex", gap:6}}>
              <select value={filterGrade} onChange={e => setFilterGrade(e.target.value)}
                style={{flex:1, border:"1px solid #D1D5DB", borderRadius:6, padding:"5px 6px", fontSize:11}}>
                <option value="all">All Grades</option>
                {["K-2","3-5","6-8","9-10","11-12"].map(g => <option key={g} value={g}>{g}</option>)}
              </select>
              <select value={filterSource} onChange={e => setFilterSource(e.target.value)}
                style={{flex:1, border:"1px solid #D1D5DB", borderRadius:6, padding:"5px 6px", fontSize:11}}>
                <option value="all">All Sources</option>
                <option value="V1">V1 Summer 2025 (Strand C)</option>
                <option value="V1-D">V1 Summer 2025 (Strand D)</option>
                <option value="A+H">Andee+Hollylynne</option>
                <option value="K+T">Kate+Thema</option>
              </select>
            </div>
          </div>
          <div style={{flex:1, overflowY:"auto", padding:"10px 12px", display:"flex", flexDirection:"column", gap:6}}>
            {unplaced.length === 0 && (
              <div style={{color:"#888", fontSize:12, padding:16, textAlign:"center"}}>
                {totalPlaced === totalItems ? "🎉 All items placed!" : "No items match your filter."}
              </div>
            )}
            {unplaced.map(c => (
              <CompCard key={c.id} c={c} onDragStart={handleDragStart} onDragEnd={handleDragEnd} />
            ))}
          </div>
        </div>

        {/* RIGHT: Drop Zones */}
        <div style={{flex:1, overflowY:"auto", padding:20, display:"flex", flexDirection:"column", gap:20}}>

          {/* Strand C substrands */}
          {STRAND_C_TARGET.substrands.map(sub => (
            <div key={sub.id} style={{background:"#fff", borderRadius:12, border:`2px solid ${sub.color}20`, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{background:sub.color, padding:"10px 16px", color:"#fff", fontWeight:700, fontSize:14, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <span>{sub.label}</span>
                <span style={{fontSize:12, fontWeight:400, opacity:0.8}}>
                  {sub.zones.reduce((a,z) => a + getZoneItems(z.id).length, 0)} items
                </span>
              </div>
              <div style={{display:"grid", gridTemplateColumns:`repeat(${sub.zones.length}, 1fr)`, gap:0}}>
                {sub.zones.map((zone, zi) => (
                  <DropZone
                    key={zone.id}
                    zone={zone}
                    items={getZoneItems(zone.id)}
                    color={sub.color}
                    lightColor={sub.lightColor}
                    isOver={dragOver === zone.id}
                    onDragOver={e => handleDragOver(e, zone.id)}
                    onDrop={e => handleDrop(e, zone.id)}
                    onRemove={handleRemove}
                    hasBorder={zi < sub.zones.length - 1}
                  />
                ))}
              </div>
            </div>
          ))}

          {/* Other strands */}
          <div style={{background:"#fff", borderRadius:12, border:"1px solid #E2E8F0", overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{background:"#64748B", padding:"10px 16px", color:"#fff", fontWeight:700, fontSize:14}}>
              Doesn't belong in Strand C → Route elsewhere
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:0}}>
              {OTHER_BUCKETS.map((b, bi) => (
                <DropZone
                  key={b.id}
                  zone={{id:b.id, label:b.label, desc:b.desc}}
                  items={getZoneItems(b.id)}
                  color={b.color}
                  lightColor={b.lightColor}
                  isOver={dragOver === b.id}
                  onDragOver={e => handleDragOver(e, b.id)}
                  onDrop={e => handleDrop(e, b.id)}
                  onRemove={handleRemove}
                  hasBorder={bi % 3 !== 2}
                  compact
                />
              ))}
            </div>
          </div>

          {/* Notes reminder */}
          <div style={{background:"#FEF9EC", border:"1px solid #F0D060", borderRadius:10, padding:"12px 16px", fontSize:12, color:"#7A5800"}}>
            <strong>Reminder on C3 structure:</strong> Unlike C1 and C2, C3 (Interpreting Variability) is <em>not</em> split into single/multi variable — the judgment about whether variability is meaningful is the same cognitive move regardless of variable count. C3 is better organized around <em>sources</em>: natural variability, measurement variability, and sampling variability.
          </div>

        </div>
      </div>
    </div>
  );
}

function CompCard({ c, onDragStart, onDragEnd, placed, onRemove }) {
  return (
    <div
      draggable
      onDragStart={() => onDragStart(c.id)}
      onDragEnd={onDragEnd}
      style={{
        background:"#FAFAFA",
        border:"1px solid #E5E7EB",
        borderRadius:8,
        padding:"9px 11px",
        cursor:"grab",
        userSelect:"none",
        fontSize:12,
        lineHeight:1.5,
        transition:"box-shadow 0.15s",
      }}
      onMouseEnter={e => e.currentTarget.style.boxShadow="0 3px 10px rgba(0,0,0,0.12)"}
      onMouseLeave={e => e.currentTarget.style.boxShadow="none"}
    >
      <div style={{display:"flex", gap:5, marginBottom:5, flexWrap:"wrap", alignItems:"center"}}>
        <span style={{
          background: GRADE_COLOR[c.grade] || "#888",
          color:"#fff", borderRadius:4, padding:"1px 7px", fontSize:10, fontWeight:700
        }}>{c.grade}</span>
        <span style={{
          background: SOURCE_COLOR[c.source] || "#888",
          color:"#fff", borderRadius:4, padding:"1px 7px", fontSize:10, fontWeight:700
        }}>{SOURCE_LABEL[c.source] || c.source}</span>
        <span style={{color:"#888", fontSize:10, fontStyle:"italic"}}>{c.concept}</span>
      </div>
      <div style={{color:"#1E293B"}}>{c.text}</div>
      {onRemove && (
        <button onClick={() => onRemove(c.id)} style={{marginTop:6, fontSize:10, background:"none", border:"1px solid #ccc", borderRadius:4, padding:"2px 8px", cursor:"pointer", color:"#666"}}>
          ← Return to queue
        </button>
      )}
    </div>
  );
}

function DropZone({ zone, items, color, lightColor, isOver, onDragOver, onDrop, onRemove, hasBorder, compact }) {
  return (
    <div
      onDragOver={onDragOver}
      onDrop={onDrop}
      style={{
        borderRight: hasBorder ? `1px solid ${color}30` : "none",
        background: isOver ? lightColor : "#FAFCFF",
        transition:"background 0.15s",
        padding:"12px 14px",
        minHeight: compact ? 80 : 120,
      }}
    >
      <div style={{fontSize:12, fontWeight:700, color, marginBottom:zone.desc ? 2 : 8}}>{zone.label}</div>
      {zone.desc && <div style={{fontSize:10, color:"#888", marginBottom:8, fontStyle:"italic"}}>{zone.desc}</div>}
      {isOver && items.length === 0 && (
        <div style={{border:`2px dashed ${color}`, borderRadius:8, height:48, display:"flex", alignItems:"center", justifyContent:"center", color, fontSize:11, opacity:0.6}}>
          Drop here
        </div>
      )}
      <div style={{display:"flex", flexDirection:"column", gap:6}}>
        {items.map(c => <CompCard key={c.id} c={c} onDragStart={() => {}} onDragEnd={() => {}} onRemove={onRemove} />)}
      </div>
      {items.length === 0 && !isOver && (
        <div style={{color:"#CBD5E1", fontSize:11, textAlign:"center", paddingTop:8}}>drag items here</div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
